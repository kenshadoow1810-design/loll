name: Check Match Notifications

on:
  schedule:
    # Rodar a cada 5 minutos (ajuste conforme necessário)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Permitir execução manual para testes

jobs:
  check-notifications:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Notification Check
        run: |
          echo "Iniciando verificação de notificações..."
          
          # Fazer requisição POST para o endpoint de notificações
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.API_BASE_URL }}/api/notifications/check-matches?minutes=15" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.NOTIFICATION_API_TOKEN }}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Resposta da API:"
          echo "$BODY"
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Verificação concluída com sucesso!"
            exit 0
          else
            echo "❌ Erro na verificação (HTTP $HTTP_CODE)"
            exit 1
          fi
